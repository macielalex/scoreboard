<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem conexão — Placar de Vôlei</title>
  <style>
    :root {
      --bg: #0d1117;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #f97316;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      text-align: center;
    }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p { color: var(--muted); max-width: 28rem; line-height: 1.5; }
    button {
      margin-top: 0.5rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <h1>Sem conexão</h1>
  <p>O placar funciona offline após a primeira visita. Verifique sua internet e tente novamente.</p>
  <button type="button" onclick="location.reload()">Tentar novamente</button>
</body>
</html>
